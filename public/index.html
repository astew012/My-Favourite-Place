<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>My Favourite Place</title>

  <!-- Leaflet map -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""/>

  <!-- Handwriting font -->
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&display=swap" rel="stylesheet"/>

  <!-- My own styles -->
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- The map goes here -->
  <div id="map"></div>
  <div id="p5-canvas"></div>

  <!-- Popup card -->
<div id="popup" class="hidden">
    <div id="popup-inner">
        <img id="popup-image" src="" alt=""/>
        <div id="popup-place-name"></div>
        <button id="mic-button">🎤 Start recording</button>
        <button id="stop-button" style="display:none">⏹ Stop</button>
        <div id="transcript"></div>
        <button id="submit-button">📍 Pin this ambient place</button>
        <button id="popup-close">✕</button>
    </div>
</div>

  <!-- Title -->
  <div id="title">Postcards from the Mind</div>

  <!-- Key -->
  <div id="key">
    <div class="key-title">How to use</div>
    <div class="key-item">Think about a place that matters to you, choose that place on the map</div>
    <div class="key-item"> Record how it makes you feel</div>
    <div class="key-item"> Submit to leave your mark</div>
    <div class="key-item"> Click a glow to explore others</div>
  </div>

  <!-- Scripts -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""></script>
  <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
  <script src="p5.min.js"></script>
  <script src="sketch.js"></script>
</body>
</html>
